<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LP Finance — CRM</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%91%A5%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Manrope:wght@300..800&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0B1E3F;
    --navy-soft: #1A2F5C;
    --navy-deep: #051330;
    --cyan: #00BFD8;
    --cyan-light: #E6F9FC;
    --bg: #F7F9FC;
    --card: #FFFFFF;
    --border: #E2E8F0;
    --border-strong: #CBD5E1;
    --text: #0B1E3F;
    --text-soft: #64748B;
    --text-muted: #94A3B8;
    --green: #047857;
    --green-bg: #D1FAE5;
    --amber: #B45309;
    --amber-bg: #FEF3C7;
    --red: #B91C1C;
    --red-bg: #FEE2E2;
    --violet: #6D28D9;
    --violet-bg: #EDE9FE;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .lp-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
  .lp-tabular { font-variant-numeric: tabular-nums; }

  /* Inputs */
  .lp-input, .lp-select, .lp-textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #FFFFFF;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: var(--text);
    transition: all 0.15s ease;
  }
  .lp-textarea { resize: vertical; min-height: 80px; }
  .lp-input:focus, .lp-select:focus, .lp-textarea:focus {
    outline: none; border-color: var(--cyan);
    box-shadow: 0 0 0 3px var(--cyan-light);
  }
  .lp-input:hover:not(:focus), .lp-select:hover:not(:focus), .lp-textarea:hover:not(:focus) {
    border-color: var(--border-strong);
  }
  .lp-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 6px; display: block;
  }
  .lp-hint {
    font-size: 12px; color: var(--text-muted);
    margin-top: 4px;
  }

  /* Buttons */
  .lp-btn-primary {
    background: var(--navy); color: #FFFFFF;
    border: none; padding: 10px 18px; border-radius: 8px;
    font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .lp-btn-primary:hover { background: var(--navy-deep); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(11, 30, 63, 0.18); }
  .lp-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .lp-btn-cyan {
    background: var(--cyan); color: var(--navy);
    border: none; padding: 10px 18px; border-radius: 8px;
    font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 0.15s ease;
  }
  .lp-btn-cyan:hover { background: #00A8C0; transform: translateY(-1px); }

  .lp-btn-ghost {
    background: transparent; color: var(--text-soft);
    border: 1px solid var(--border);
    padding: 9px 14px; border-radius: 8px;
    font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s ease;
  }
  .lp-btn-ghost:hover { background: var(--bg); color: var(--text); border-color: var(--border-strong); }

  .lp-btn-danger {
    background: transparent; color: var(--red);
    border: 1px solid var(--red-bg);
    padding: 8px 12px; border-radius: 8px;
    font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s ease;
  }
  .lp-btn-danger:hover { background: var(--red-bg); }

  /* Card */
  .lp-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: box-shadow 0.2s ease;
  }
  .lp-card:hover { box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04); }

  /* Badges */
  .lp-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 999px;
    letter-spacing: 0.02em;
  }
  .lp-badge-green { background: var(--green-bg); color: var(--green); }
  .lp-badge-amber { background: var(--amber-bg); color: var(--amber); }
  .lp-badge-red { background: var(--red-bg); color: var(--red); }
  .lp-badge-cyan { background: var(--cyan-light); color: #0E7490; }
  .lp-badge-navy { background: #E2E8F0; color: var(--navy); }
  .lp-badge-violet { background: var(--violet-bg); color: var(--violet); }

  /* Sidebar */
  .lp-sidebar {
    width: 240px; min-height: 100vh;
    background: var(--navy);
    color: #FFFFFF;
    padding: 28px 18px;
    display: flex; flex-direction: column;
    position: fixed; left: 0; top: 0;
  }
  .lp-sidebar-link {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; border-radius: 8px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    font-size: 14px; font-weight: 500;
    transition: all 0.15s ease;
    text-decoration: none;
  }
  .lp-sidebar-link:hover { background: rgba(255,255,255,0.06); color: #FFFFFF; }
  .lp-sidebar-link.active {
    background: rgba(0, 191, 216, 0.15);
    color: var(--cyan);
  }

  /* Layout main */
  .lp-main {
    margin-left: 240px;
    min-height: 100vh;
    padding: 32px 40px;
  }
  @media (max-width: 768px) {
    .lp-sidebar { display: none; }
    .lp-main { margin-left: 0; padding: 20px; }
  }

  /* Drawer */
  .lp-drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(11, 30, 63, 0.45);
    z-index: 100;
    display: flex; justify-content: flex-end;
    animation: lp-fade 0.2s ease;
  }
  .lp-drawer {
    width: min(880px, 100%);
    height: 100vh;
    background: var(--bg);
    overflow-y: auto;
    animation: lp-slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: -8px 0 32px rgba(11, 30, 63, 0.12);
  }
  @keyframes lp-fade { from { opacity: 0 } to { opacity: 1 } }
  @keyframes lp-slide-in { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Tabs */
  .lp-tabs {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .lp-tab {
    padding: 12px 18px;
    font-size: 13px; font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    border: none; background: transparent;
    border-bottom: 2px solid transparent;
    transition: all 0.15s ease;
    white-space: nowrap;
    font-family: 'Manrope', sans-serif;
  }
  .lp-tab:hover { color: var(--text); }
  .lp-tab.active { color: var(--navy); border-bottom-color: var(--cyan); }

  /* Modal */
  .lp-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(11, 30, 63, 0.5);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: lp-fade 0.2s ease;
  }
  .lp-modal {
    background: #FFFFFF;
    border-radius: 16px;
    max-width: 520px; width: 100%;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(11, 30, 63, 0.25);
    animation: lp-modal-in 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes lp-modal-in { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* Stat card */
  .lp-stat {
    padding: 22px 24px;
  }
  .lp-stat-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 10px;
  }
  .lp-stat-value {
    font-family: 'Fraunces', serif;
    font-size: 32px; font-weight: 500;
    color: var(--navy);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .lp-stat-sub {
    font-size: 12px; color: var(--text-soft);
    margin-top: 8px;
  }

  /* Table */
  .lp-table { width: 100%; border-collapse: collapse; }
  .lp-table thead th {
    text-align: left;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-soft);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: #FAFBFD;
  }
  .lp-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s ease;
    cursor: pointer;
  }
  .lp-table tbody tr:hover { background: #FAFBFD; }
  .lp-table tbody td {
    padding: 16px;
    font-size: 14px;
    color: var(--text);
  }

  /* Empty state */
  .lp-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
  }
  .lp-empty-icon {
    width: 72px; height: 72px;
    margin: 0 auto 16px;
    background: var(--cyan-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--cyan);
  }

  /* Avatar */
  .lp-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--navy), var(--cyan));
    color: #FFFFFF;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    flex-shrink: 0;
  }
  .lp-avatar-lg { width: 56px; height: 56px; font-size: 20px; }

  /* Toast */
  .lp-toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy);
    color: #FFFFFF;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 14px; font-weight: 500;
    box-shadow: 0 10px 30px rgba(11, 30, 63, 0.3);
    z-index: 300;
    animation: lp-toast-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; gap: 10px;
  }
  @keyframes lp-toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Slider */
  .lp-slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px;
    background: var(--border);
    border-radius: 2px; outline: none; cursor: pointer;
  }
  .lp-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px;
    background: var(--navy);
    border: 3px solid #FFFFFF;
    border-radius: 50%; cursor: pointer;
    box-shadow: 0 2px 8px rgba(11, 30, 63, 0.25);
  }

  /* Boot screen */
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 999;
    flex-direction: column; gap: 16px;
  }
  #boot .logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--navy), var(--cyan));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(0, 191, 216, 0.25);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.85; }
  }
  #boot .text {
    font-family: 'Fraunces', serif; font-size: 15px;
    color: var(--text-soft); letter-spacing: 0.05em;
  }

  /* Helpers */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  @media (max-width: 720px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 4px; }

  .lp-section-title {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 500;
    color: var(--navy);
    margin: 0 0 16px 0;
    letter-spacing: -0.01em;
  }

  /* Search */
  .lp-search-wrap { position: relative; max-width: 360px; }
  .lp-search-wrap input { padding-left: 38px; }
  .lp-search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

  /* Pulse alert */
  .lp-pulse {
    width: 8px; height: 8px;
    background: var(--amber);
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(180, 83, 9, 0.5);
    animation: lp-pulse-anim 2s infinite;
  }
  @keyframes lp-pulse-anim {
    0% { box-shadow: 0 0 0 0 rgba(180, 83, 9, 0.5); }
    70% { box-shadow: 0 0 0 8px rgba(180, 83, 9, 0); }
    100% { box-shadow: 0 0 0 0 rgba(180, 83, 9, 0); }
  }

  /* Allocation bar */
  .lp-alloc-bar {
    display: flex; height: 8px; border-radius: 4px; overflow: hidden;
    background: var(--border);
  }

  /* Print-only helpers (none) */
</style>
</head>
<body>
<div id="boot">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="m22 11-3 3-2-2"/>
    </svg>
  </div>
  <div class="text">Carregando CRM…</div>
</div>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* =========================================================================
   HELPERS
   ========================================================================= */

const STORAGE_KEY = 'lp_crm_v1';
const uid = () => Math.random().toString(36).slice(2, 11);
const todayISO = () => new Date().toISOString().slice(0, 10);

const fmtBRL = (n) => {
  if (n === null || n === undefined || isNaN(n)) return 'R$ 0';
  return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
};
const fmtBRL2 = (n) => {
  if (n === null || n === undefined || isNaN(n)) return 'R$ 0,00';
  return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 }).format(n);
};
const fmtPct = (n, d = 1) => {
  if (n === null || n === undefined || isNaN(n)) return '0%';
  return n.toFixed(d).replace('.', ',') + '%';
};
const fmtDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T12:00:00' : ''));
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
};
const fmtDateShort = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T12:00:00' : ''));
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
};
const initials = (name) => {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
};
const monthsBetween = (fromISO, toISO) => {
  if (!fromISO) return 0;
  const f = new Date(fromISO + 'T12:00:00');
  const t = toISO ? new Date(toISO + 'T12:00:00') : new Date();
  return (t.getFullYear() - f.getFullYear()) * 12 + (t.getMonth() - f.getMonth()) + (t.getDate() >= f.getDate() ? 0 : -1);
};
const daysBetween = (fromISO, toISO) => {
  if (!fromISO) return 0;
  const f = new Date(fromISO + 'T12:00:00');
  const t = toISO ? new Date(toISO + 'T12:00:00') : new Date();
  return Math.round((t - f) / (1000 * 60 * 60 * 24));
};

/* Plano: faixa de renda → preço base
   Tier 1 (< R$ 15k):     Básico 197 / Essencial 297 / Premium 397
   Tier 2 (R$ 15k–20k):   Básico 297 / Essencial 397 / Premium 497  (+R$ 100)
   Tier 3 (>= R$ 20k):    Básico 397 / Essencial 597 / Premium 797
*/
const PLANS = [
  { id: 'basico', name: 'Básico' },
  { id: 'essencial', name: 'Essencial' },
  { id: 'premium', name: 'Premium' },
];
const PLAN_PRICE = (plano, rendaMensal) => {
  const r = Number(rendaMensal) || 0;
  let prices;
  if (r < 15000) prices = { basico: 197, essencial: 297, premium: 397 };
  else if (r < 20000) prices = { basico: 297, essencial: 397, premium: 497 };
  else prices = { basico: 397, essencial: 597, premium: 797 };
  return prices[plano] || 0;
};
const TIER_LABEL = (rendaMensal) => {
  const r = Number(rendaMensal) || 0;
  if (r < 15000) return 'Faixa 1 · até R$ 15k';
  if (r < 20000) return 'Faixa 2 · R$ 15k–20k';
  return 'Faixa 3 · R$ 20k+';
};

const PERFIS = [
  { id: 'conservador', name: 'Conservador' },
  { id: 'moderado', name: 'Moderado' },
  { id: 'arrojado', name: 'Arrojado' },
];

const STATUS_OPTIONS = [
  { id: 'ativo', name: 'Ativo' },
  { id: 'inativo', name: 'Inativo' },
  { id: 'prospeccao', name: 'Em prospecção' },
];

/* =========================================================================
   STORAGE
   ========================================================================= */

const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { clients: [], settings: { ipcaUltimo12: 4.5 } };
    const parsed = JSON.parse(raw);
    return { clients: parsed.clients || [], settings: parsed.settings || { ipcaUltimo12: 4.5 } };
  } catch (e) {
    console.error('Erro ao carregar dados', e);
    return { clients: [], settings: { ipcaUltimo12: 4.5 } };
  }
};
const saveData = (data) => {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error('Erro ao salvar dados', e);
  }
};

const newClient = () => ({
  id: uid(),
  // Identificação
  nome: '',
  idade: '',
  profissao: '',
  whatsapp: '',
  email: '',
  status: 'ativo',
  origem: '',
  // Plano & Cobrança
  plano: 'essencial',
  rendaMensal: '',
  valorMensal: '',
  dataAssinatura: todayISO(),
  ultimoReajuste: null,
  historicoReajustes: [],
  // Diagnóstico (Fathom)
  resumoCall: '',
  dorPrincipal: '',
  objetivosLongoPrazo: '',
  patrimonioInicial: '',
  aporteMensal: '',
  horizonteAnos: '',
  metaRendaPassiva: '',
  idadeAposentadoria: '',
  perfilRisco: 'moderado',
  // Carteira
  carteira: { fiis: '', acoes: '', internacionais: '', cripto: '', caixa: '', valorTotal: '', ultimaAtualizacao: null },
  // Histórico
  notas: '',
  proximaAcao: '',
  proximaCallData: null,
  // Meta
  criadoEm: new Date().toISOString(),
  atualizadoEm: new Date().toISOString(),
});

/* =========================================================================
   ICONS
   ========================================================================= */
const Icon = ({ name, size = 18, ...props }) => {
  const paths = {
    home: <><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5z"/></>,
    users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
    plus: <><path d="M12 5v14M5 12h14"/></>,
    search: <><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></>,
    close: <><path d="M18 6 6 18M6 6l12 12"/></>,
    edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,

      {paths[name]}

};

/* =========================================================================
   APP STATE & ROOT
   ========================================================================= */

function App() {
  const [data, setData] = useState(loadData);
  const [route, setRoute] = useState('dashboard'); // dashboard | clients | cobrancas | config
  const [openClientId, setOpenClientId] = useState(null);
  const [pendingNewClientId, setPendingNewClientId] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(() => { saveData(data); }, [data]);

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  }, []);

  const upsertClient = (client) => {
    setData(prev => {
      const exists = prev.clients.some(c => c.id === client.id);
      const updated = { ...client, atualizadoEm: new Date().toISOString() };
      return {
        ...prev,
        clients: exists ? prev.clients.map(c => c.id === client.id ? updated : c) : [...prev.clients, updated],
      };
    });
    if (pendingNewClientId === client.id) setPendingNewClientId(null);
  };

  const deleteClient = (id) => {
    setData(prev => ({ ...prev, clients: prev.clients.filter(c => c.id !== id) }));
    setOpenClientId(null);
    if (pendingNewClientId === id) setPendingNewClientId(null);
    showToast('Cliente removido');
  };

  const closeDrawer = () => {
    // Se for um cliente recém-criado e nunca preenchido, remove silenciosamente
    if (pendingNewClientId) {
      const c = data.clients.find(x => x.id === pendingNewClientId);
      if (c && !c.nome?.trim()) {
        setData(prev => ({ ...prev, clients: prev.clients.filter(x => x.id !== pendingNewClientId) }));
      }
      setPendingNewClientId(null);
    }
    setOpenClientId(null);
  };

  const updateSettings = (settings) => {
    setData(prev => ({ ...prev, settings: { ...prev.settings, ...settings } }));
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `lp-crm-backup-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup exportado');
  };

  const importJSON = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (imported.clients) {
          setData(imported);
          showToast('Backup importado');
        } else {
          showToast('Arquivo inválido');
        }
      } catch (err) {
        showToast('Erro ao ler arquivo');
      }
    };
    reader.readAsText(file);
  };

  const openClient = (id) => setOpenClientId(id);
  const createClient = () => {
    const c = newClient();
    upsertClient(c);
    setPendingNewClientId(c.id);
    setOpenClientId(c.id);
  };

  useEffect(() => {
    const boot = document.getElementById('boot');
    if (boot) boot.style.display = 'none';
  }, []);

  const currentClient = data.clients.find(c => c.id === openClientId);

  return (
    <>
      <Sidebar route={route} setRoute={setRoute} clientCount={data.clients.length} />
      <main className="lp-main">
        {route === 'dashboard' && (
          <Dashboard
            data={data}
            onOpenClient={openClient}
            onCreateClient={createClient}
            updateSettings={updateSettings}
          />
        )}
        {route === 'clients' && (
          <ClientList
            clients={data.clients}
            onOpenClient={openClient}
            onCreateClient={createClient}
          />
        )}
        {route === 'cobrancas' && (
          <Cobrancas showToast={showToast} />
        )}
        {route === 'config' && (
          <Settings
            settings={data.settings}
            updateSettings={updateSettings}
            exportJSON={exportJSON}
            importJSON={importJSON}
            clientCount={data.clients.length}
          />
        )}
      </main>
      {currentClient && (
        <ClientDrawer
          client={currentClient}
          onClose={closeDrawer}
          onSave={(c) => { upsertClient(c); showToast('Salvo'); }}
          onDelete={deleteClient}
          ipcaUltimo12={data.settings.ipcaUltimo12}
          showToast={showToast}
        />
      )}
      {toast && <div className="lp-toast"><Icon name="check" size={16}/>{toast}</div>}
    </>
  );
}

/* =========================================================================
   DASHBOARD
   ========================================================================= */

function Dashboard({ data, onOpenClient, onCreateClient, updateSettings }) {
  const { clients } = data;

  const stats = useMemo(() => {
    const ativos = clients.filter(c => c.status === 'ativo');
    const prosp = clients.filter(c => c.status === 'prospeccao');
    const mrr = ativos.reduce((s, c) => s + (Number(c.valorMensal) || 0), 0);
    const arr = mrr * 12;
    const aum = ativos.reduce((s, c) => s + (Number(c.carteira?.valorTotal) || 0), 0);
    return { ativos: ativos.length, prosp: prosp.length, total: clients.length, mrr, arr, aum };
  }, [clients]);

  const reajustesPendentes = useMemo(() => {
    return clients
      .filter(c => c.status === 'ativo')
      .map(c => {
        const referencia = c.ultimoReajuste || c.dataAssinatura;
        const meses = monthsBetween(referencia);
        return { ...c, mesesDesdeUltimoReajuste: meses, referencia };
      })
      .filter(c => c.mesesDesdeUltimoReajuste >= 12)
      .sort((a, b) => b.mesesDesdeUltimoReajuste - a.mesesDesdeUltimoReajuste);
  }, [clients]);

  const proximosVencimentos = useMemo(() => {
    return clients
      .filter(c => c.status === 'ativo')
      .map(c => {
        const referencia = c.ultimoReajuste || c.dataAssinatura;
        const meses = monthsBetween(referencia);
        const diasParaVencer = (12 - meses) * 30;
        return { ...c, mesesDesdeUltimoReajuste: meses, diasParaVencer, referencia };
      })
      .filter(c => c.mesesDesdeUltimoReajuste >= 9 && c.mesesDesdeUltimoReajuste < 12)
      .sort((a, b) => b.mesesDesdeUltimoReajuste - a.mesesDesdeUltimoReajuste);
  }, [clients]);

  const proximasAcoes = useMemo(() => {
    return clients
      .filter(c => c.proximaCallData)
      .sort((a, b) => new Date(a.proximaCallData) - new Date(b.proximaCallData))
      .slice(0, 5);
  }, [clients]);

  const recentes = useMemo(() => {
    return [...clients]
      .sort((a, b) => new Date(b.criadoEm) - new Date(a.criadoEm))
      .slice(0, 4);
  }, [clients]);

  return (
    <div>
      <div className="row-between" style={{ marginBottom: 28 }}>
        <div>
          <h1 className="lp-display" style={{ margin: 0, fontSize: 32, fontWeight: 500, letterSpacing: '-0.02em' }}>Visão geral</h1>
          <p style={{ margin: '6px 0 0', color: 'var(--text-soft)', fontSize: 14 }}>{new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
        </div>
        <button className="lp-btn-primary" onClick={onCreateClient}>
          <Icon name="plus" size={16}/>
          Novo cliente
        </button>
      </div>

      <div className="grid-4" style={{ marginBottom: 24 }}>
        <div className="lp-card lp-stat">
          <div className="lp-stat-label">Clientes ativos</div>
          <div className="lp-stat-value lp-tabular">{stats.ativos}</div>
          <div className="lp-stat-sub">{stats.prosp > 0 ? `+ ${stats.prosp} em prospecção` : 'Nenhum em prospecção'}</div>
        </div>
        <div className="lp-card lp-stat">
          <div className="lp-stat-label">MRR · receita mensal</div>
          <div className="lp-stat-value lp-tabular">{fmtBRL(stats.mrr)}</div>
          <div className="lp-stat-sub">ARR · {fmtBRL(stats.arr)}</div>
        </div>
        <div className="lp-card lp-stat">
          <div className="lp-stat-label">Reajustes pendentes</div>
          <div className="lp-stat-value lp-tabular" style={{ color: reajustesPendentes.length > 0 ? 'var(--amber)' : 'var(--navy)' }}>{reajustesPendentes.length}</div>
          <div className="lp-stat-sub">12+ meses sem reajustar</div>
        </div>
        <div className="lp-card lp-stat">
          <div className="lp-stat-label">AUM acompanhado</div>
          <div className="lp-stat-value lp-tabular">{fmtBRL(stats.aum)}</div>
          <div className="lp-stat-sub">Patrimônio dos clientes ativos</div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 20 }}>
        <div>
          {reajustesPendentes.length > 0 && (
            <div className="lp-card" style={{ padding: 22, marginBottom: 20, borderColor: '#FCD34D', background: '#FFFBEB' }}>
              <div className="row-between" style={{ marginBottom: 14 }}>
                <div className="row" style={{ gap: 10 }}>
                  <div className="lp-pulse"/>
                  <h2 className="lp-section-title" style={{ margin: 0, color: 'var(--amber)' }}>Reajustes IPCA pendentes</h2>
                </div>
                <span className="lp-badge lp-badge-amber">{reajustesPendentes.length} cliente{reajustesPendentes.length > 1 ? 's' : ''}</span>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {reajustesPendentes.map(c => (
                  <div key={c.id} onClick={() => onOpenClient(c.id)} style={{
                    padding: '12px 14px', background: '#FFFFFF', borderRadius: 8,
                    cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12,
                    border: '1px solid var(--border)',
                  }}>
                    <div className="lp-avatar">{initials(c.nome)}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--navy)' }}>{c.nome || 'Sem nome'}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-soft)' }}>
                        {c.mesesDesdeUltimoReajuste} meses desde {c.ultimoReajuste ? 'último reajuste' : 'assinatura'} · plano {PLANS.find(p => p.id === c.plano)?.name} · {fmtBRL(c.valorMensal)}/mês
                      </div>
                    </div>
                    <Icon name="arrowRight" size={16} style={{ color: 'var(--text-muted)' }}/>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="lp-card" style={{ padding: 22, marginBottom: 20 }}>
            <h2 className="lp-section-title">Próximos a vencer · 1–3 meses</h2>
            {proximosVencimentos.length === 0 ? (
              <div style={{ fontSize: 13, color: 'var(--text-soft)', padding: '12px 0' }}>Nenhum cliente perto do reajuste anual.</div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {proximosVencimentos.map(c => (
                  <div key={c.id} onClick={() => onOpenClient(c.id)} style={{
                    padding: '10px 12px', borderRadius: 8, cursor: 'pointer',
                    display: 'flex', alignItems: 'center', gap: 12,
                    background: 'var(--bg)',
                  }}>
                    <div className="lp-avatar">{initials(c.nome)}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 500 }}>{c.nome || 'Sem nome'}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-soft)' }}>{c.mesesDesdeUltimoReajuste} meses · falta ~{12 - c.mesesDesdeUltimoReajuste} mês{(12 - c.mesesDesdeUltimoReajuste) > 1 ? 'es' : ''}</div>
                    </div>
                    <Icon name="arrowRight" size={16} style={{ color: 'var(--text-muted)' }}/>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="lp-card" style={{ padding: 22 }}>
            <div className="row-between" style={{ marginBottom: 14 }}>
              <h2 className="lp-section-title" style={{ margin: 0 }}>Adicionados recentemente</h2>
              <button className="lp-btn-ghost" onClick={onCreateClient}><Icon name="plus" size={14}/>Adicionar</button>
            </div>
            {recentes.length === 0 ? (
              <EmptyState onCreate={onCreateClient}/>
            ) : (
              <div className="grid-2">
                {recentes.map(c => (
                  <div key={c.id} onClick={() => onOpenClient(c.id)} style={{
                    padding: 14, borderRadius: 10, cursor: 'pointer',
                    border: '1px solid var(--border)',
                    display: 'flex', flexDirection: 'column', gap: 8,
                    transition: 'all 0.15s ease',
                  }}
                  onMouseEnter={(e) => e.currentTarget.style.borderColor = 'var(--cyan)'}
                  onMouseLeave={(e) => e.currentTarget.style.borderColor = 'var(--border)'}
                  >
                    <div className="row" style={{ gap: 10 }}>
                      <div className="lp-avatar">{initials(c.nome)}</div>
                      <div className="col" style={{ gap: 2, flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 14, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.nome || 'Sem nome'}</div>
                        <div style={{ fontSize: 12, color: 'var(--text-soft)' }}>{PLANS.find(p => p.id === c.plano)?.name || '—'} · {fmtBRL(c.valorMensal)}</div>
                      </div>
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>Cliente desde {fmtDate(c.dataAssinatura)}</div>
                  </div>
                ))}

            )}
          </div>
        </div>

        <div>
          <div className="lp-card" style={{ padding: 22, marginBottom: 20 }}>
            <h2 className="lp-section-title">IPCA acumulado</h2>
            <p style={{ fontSize: 12, color: 'var(--text-soft)', margin: '0 0 12px' }}>Últimos 12 meses · usado para sugerir reajustes</p>
            <div className="row" style={{ gap: 8 }}>
              <input
                type="number" step="0.01"
                value={data.settings.ipcaUltimo12}
                onChange={(e) => updateSettings({ ipcaUltimo12: Number(e.target.value) })}

                style={{ flex: 1 }}
              />
              <span style={{ fontSize: 14, color: 'var(--text-soft)' }}>%</span>

            <p className="lp-hint">Ajuste manual conforme IBGE divulga. Você pode personalizar por cliente na hora de aplicar o reajuste.</p>
          </div>

          <div className="lp-card" style={{ padding: 22 }}>
            <h2 className="lp-section-title">Próximas ações</h2>
            {proximasAcoes.length === 0 ? (
              <div style={{ fontSize: 13, color: 'var(--text-soft)', padding: '12px 0' }}>Nenhuma call agendada.</div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {proximasAcoes.map(c => (
                  <div key={c.id} onClick={() => onOpenClient(c.id)} style={{
                    padding: 12, borderRadius: 8, cursor: 'pointer',
                    border: '1px solid var(--border)',
                    background: '#FAFBFD',
                  }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--cyan)', letterSpacing: '0.05em', textTransform: 'uppercase' }}>{fmtDateShort(c.proximaCallData)}</div>
                    <div style={{ fontSize: 14, fontWeight: 500, marginTop: 4 }}>{c.nome || 'Sem nome'}</div>
                    {c.proximaAcao && <div style={{ fontSize: 12, color: 'var(--text-soft)', marginTop: 4 }}>{c.proximaAcao}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

      <div style={{ fontSize: 16, fontWeight: 600, color: 'var(--navy)', marginBottom: 6 }}>Nenhum cliente ainda</div>

/* =========================================================================
   CLIENT LIST
   ========================================================================= */

function ClientList({ clients, onOpenClient, onCreateClient }) {
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('todos');
  const [planFilter, setPlanFilter] = useState('todos');
  const [sortBy, setSortBy] = useState('recent');

  const filtered = useMemo(() => {
    let out = [...clients];
    if (search) {
      const s = search.toLowerCase();
      out = out.filter(c =>
        (c.nome || '').toLowerCase().includes(s) ||
        (c.email || '').toLowerCase().includes(s) ||
        (c.whatsapp || '').toLowerCase().includes(s)
      );
    }
    if (statusFilter !== 'todos') out = out.filter(c => c.status === statusFilter);
    if (planFilter !== 'todos') out = out.filter(c => c.plano === planFilter);

    out.sort((a, b) => {
      if (sortBy === 'recent') return new Date(b.criadoEm) - new Date(a.criadoEm);
      if (sortBy === 'nome') return (a.nome || '').localeCompare(b.nome || '');
      if (sortBy === 'valor') return (Number(b.valorMensal) || 0) - (Number(a.valorMensal) || 0);
      if (sortBy === 'antigo') return new Date(a.dataAssinatura) - new Date(b.dataAssinatura);
      return 0;
    });
    return out;
  }, [clients, search, statusFilter, planFilter, sortBy]);

  return (
    <div>
      <div className="row-between" style={{ marginBottom: 24 }}>
        <div>
          <h1 className="lp-display" style={{ margin: 0, fontSize: 32, fontWeight: 500, letterSpacing: '-0.02em' }}>Clientes</h1>
          <p style={{ margin: '6px 0 0', color: 'var(--text-soft)', fontSize: 14 }}>{filtered.length} de {clients.length} {clients.length === 1 ? 'cliente' : 'clientes'}</p>
        </div>
        <button className="lp-btn-primary" onClick={onCreateClient}>
          <Icon name="plus" size={16}/>
          Novo cliente
        </button>
      </div>

      <div className="lp-card" style={{ padding: 16, marginBottom: 16 }}>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          <div className="lp-search-wrap" style={{ flex: 1, minWidth: 220 }}>
            <Icon name="search" size={16}/>
            <input
              type="text"
              placeholder="Buscar por nome, e-mail ou WhatsApp…"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              className="lp-input"
            />
          </div>
          <select className="lp-select" style={{ width: 'auto', minWidth: 140 }} value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)}>
            <option value="todos">Todos os status</option>
            {STATUS_OPTIONS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <select className="lp-select" style={{ width: 'auto', minWidth: 130 }} value={planFilter} onChange={(e) => setPlanFilter(e.target.value)}>
            <option value="todos">Todos os planos</option>
            {PLANS.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <select className="lp-select" style={{ width: 'auto', minWidth: 140 }} value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
            <option value="recent">Mais recentes</option>
            <option value="antigo">Mais antigos</option>
            <option value="nome">Nome A–Z</option>
            <option value="valor">Maior valor</option>
          </select>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="lp-card" style={{ padding: 40 }}>
          {clients.length === 0 ? (
            <EmptyState onCreate={onCreateClient}/>
          ) : (
            <div className="lp-empty">
              <div style={{ fontSize: 14 }}>Nenhum cliente encontrado com esses filtros.</div>
            </div>
          )}
        </div>
      ) : (
        <div className="lp-card" style={{ overflow: 'hidden' }}>
          <table className="lp-table">
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Plano</th>
                <th>Valor</th>
                <th>Cliente desde</th>
                <th>Status reajuste</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(c => <ClientRow key={c.id} client={c} onClick={() => onOpenClient(c.id)} />)}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function ClientRow({ client, onClick }) {
  const referencia = client.ultimoReajuste || client.dataAssinatura;
  const meses = monthsBetween(referencia);
  const plano = PLANS.find(p => p.id === client.plano)?.name || '—';

  let reajusteBadge;
  if (client.status !== 'ativo') {
    reajusteBadge = <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>—</span>;
  } else if (meses >= 12) {
    reajusteBadge = <span className="lp-badge lp-badge-amber"><div className="lp-pulse" style={{ width: 6, height: 6 }}/>Pendente · {meses}m</span>;
  } else if (meses >= 9) {
    reajusteBadge = <span className="lp-badge lp-badge-cyan">Próximo · {meses}m</span>;
  } else {
    reajusteBadge = <span style={{ fontSize: 12, color: 'var(--text-soft)' }} className="lp-tabular">{meses}m</span>;
  }

  let statusBadge;
  if (client.status === 'ativo') statusBadge = <span className="lp-badge lp-badge-green">Ativo</span>;
  else if (client.status === 'prospeccao') statusBadge = <span className="lp-badge lp-badge-violet">Prospecção</span>;
  else statusBadge = <span className="lp-badge lp-badge-navy">Inativo</span>;

  return (
    <tr onClick={onClick}>
      <td>
        <div className="row" style={{ gap: 12 }}>
          <div className="lp-avatar">{initials(client.nome)}</div>
          <div className="col" style={{ gap: 2 }}>
            <span style={{ fontWeight: 600 }}>{client.nome || 'Sem nome'}</span>
            <span style={{ fontSize: 12, color: 'var(--text-soft)' }}>{client.whatsapp || client.email || '—'}</span>
          </div>
        </div>
      </td>
      <td><span className="lp-badge lp-badge-cyan">{plano}</span></td>
      <td className="lp-tabular" style={{ fontWeight: 600 }}>{fmtBRL(client.valorMensal)}</td>
      <td className="lp-tabular" style={{ color: 'var(--text-soft)' }}>{fmtDate(client.dataAssinatura)}</td>
      <td>{reajusteBadge}</td>
      <td>{statusBadge}</td>
    </tr>
  );
}

/* =========================================================================
   CLIENT DRAWER
   ========================================================================= */

function ClientDrawer({ client, onClose, onSave, onDelete, ipcaUltimo12, showToast }) {
  const [tab, setTab] = useState('identificacao');
  const [draft, setDraft] = useState(client);
  const [reajusteModal, setReajusteModal] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const dirtyRef = useRef(false);

  useEffect(() => { setDraft(client); dirtyRef.current = false; }, [client.id]);

  const update = (patch) => {
    setDraft(prev => ({ ...prev, ...patch }));
    dirtyRef.current = true;
  };
  const updateCarteira = (patch) => {
    setDraft(prev => ({ ...prev, carteira: { ...prev.carteira, ...patch } }));
    dirtyRef.current = true;
  };

  // Auto-suggest valor mensal quando muda plano ou renda
  useEffect(() => {
    if (draft.plano && draft.rendaMensal !== '' && draft.rendaMensal !== null) {
      const suggested = PLAN_PRICE(draft.plano, Number(draft.rendaMensal));
      if (Number(draft.valorMensal) !== suggested && (draft.valorMensal === '' || draft.valorMensal === null)) {
        update({ valorMensal: suggested });
      }
    }
  }, [draft.plano, draft.rendaMensal]);

  const save = () => {
    onSave(draft);
    dirtyRef.current = false;
  };

  const handleClose = () => {
    if (dirtyRef.current) {
      if (!confirm('Você tem alterações não salvas. Salvar antes de fechar?')) {
        onClose();
        return;
      }
      save();
    }
    onClose();
  };

  const aplicarReajuste = (ipcaPct) => {
    const valorAtual = Number(draft.valorMensal) || 0;
    const novoValor = Math.round(valorAtual * (1 + ipcaPct / 100) * 100) / 100;
    const registro = {
      data: todayISO(),
      ipcaPct,
      valorAnterior: valorAtual,
      valorNovo: novoValor,
    };
    const updated = {
      ...draft,
      valorMensal: novoValor,
      ultimoReajuste: todayISO(),
      historicoReajustes: [...(draft.historicoReajustes || []), registro],
    };
    setDraft(updated);
    onSave(updated);
    setReajusteModal(false);
    showToast(`Reajuste aplicado · ${fmtBRL2(novoValor)}`);
  };

  const referencia = draft.ultimoReajuste || draft.dataAssinatura;
  const mesesDesdeReajuste = monthsBetween(referencia);
  const reajustePendente = draft.status === 'ativo' && mesesDesdeReajuste >= 12;

  return (
    <div className="lp-drawer-overlay" onClick={handleClose}>
      <div className="lp-drawer" onClick={(e) => e.stopPropagation()}>
        {/* Header */}
        <div style={{ padding: '24px 32px', borderBottom: '1px solid var(--border)', background: '#FFFFFF', position: 'sticky', top: 0, zIndex: 10 }}>
          <div className="row-between" style={{ marginBottom: 16 }}>
            <button className="lp-btn-ghost" onClick={handleClose}>
              <Icon name="close" size={16}/>
              Fechar
            </button>
            <div className="row" style={{ gap: 8 }}>
              {confirmDelete ? (
                <>
                  <button className="lp-btn-ghost" onClick={() => setConfirmDelete(false)}>Cancelar</button>
                  <button className="lp-btn-danger" onClick={() => onDelete(draft.id)}>
                    <Icon name="trash" size={14}/>
                    Confirmar exclusão
                  </button>
                </>
              ) : (
                <>
                  <button className="lp-btn-danger" onClick={() => setConfirmDelete(true)}>
                    <Icon name="trash" size={14}/>
                  </button>
                  <button className="lp-btn-primary" onClick={save}>
                    <Icon name="check" size={16}/>
                    Salvar
                  </button>
                </>
              )}
            </div>
          </div>

          <div className="row" style={{ gap: 16 }}>
            <div className="lp-avatar lp-avatar-lg">{initials(draft.nome)}</div>
            <div className="col" style={{ gap: 4, flex: 1 }}>
              <input
                type="text" placeholder="Nome do cliente"
                value={draft.nome}
                onChange={(e) => update({ nome: e.target.value })}
                className="lp-display"
                style={{
                  border: 'none', background: 'transparent', outline: 'none',
                  fontSize: 24, fontWeight: 500, padding: 0, color: 'var(--navy)',
                  letterSpacing: '-0.02em', width: '100%',
                }}
              />
              <div className="row" style={{ gap: 8, flexWrap: 'wrap' }}>
                <span className="lp-badge lp-badge-cyan">{PLANS.find(p => p.id === draft.plano)?.name}</span>
                <span className="lp-badge lp-badge-navy lp-tabular">{fmtBRL(draft.valorMensal)}/mês</span>
                {draft.dataAssinatura && (
                  <span style={{ fontSize: 12, color: 'var(--text-soft)' }}>
                    Cliente há {Math.floor(monthsBetween(draft.dataAssinatura) / 12)}a {monthsBetween(draft.dataAssinatura) % 12}m
                  </span>
                )}
              </div>
            </div>
          </div>

          {reajustePendente && (
            <div style={{
              marginTop: 16, padding: '12px 16px',
              background: '#FFFBEB', border: '1px solid #FCD34D', borderRadius: 10,
              display: 'flex', alignItems: 'center', gap: 12,
            }}>
              <Icon name="alert" size={20} style={{ color: 'var(--amber)' }}/>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--amber)' }}>Reajuste IPCA pendente</div>
                <div style={{ fontSize: 12, color: 'var(--text-soft)' }}>{mesesDesdeReajuste} meses desde {draft.ultimoReajuste ? 'o último reajuste' : 'a assinatura'}</div>
              </div>
              <button className="lp-btn-cyan" onClick={() => setReajusteModal(true)}>
                <Icon name="refresh" size={14}/>
                Aplicar reajuste
              </button>
            </div>
          )}

          <div className="lp-tabs" style={{ marginTop: 24, marginBottom: 0, borderBottom: 'none' }}>
            {[
              { id: 'identificacao', label: 'Identificação', icon: 'user' },
              { id: 'plano', label: 'Plano & Cobrança', icon: 'wallet' },
              { id: 'diagnostico', label: 'Diagnóstico', icon: 'sparkles' },
              { id: 'carteira', label: 'Carteira', icon: 'chart' },
              { id: 'historico', label: 'Histórico', icon: 'file' },
            ].map(t => (
              <button key={t.id} className={`lp-tab ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                  <Icon name={t.icon} size={14}/>{t.label}
                </span>
              </button>
            ))}
          </div>
        </div>

        {/* Body */}
        <div style={{ padding: 32 }}>
          {tab === 'identificacao' && <TabIdentificacao draft={draft} update={update}/>}
          {tab === 'plano' && <TabPlano draft={draft} update={update} onAplicarReajuste={() => setReajusteModal(true)} mesesDesdeReajuste={mesesDesdeReajuste}/>}
          {tab === 'diagnostico' && <TabDiagnostico draft={draft} update={update}/>}
          {tab === 'carteira' && <TabCarteira draft={draft} update={update} updateCarteira={updateCarteira}/>}
          {tab === 'historico' && <TabHistorico draft={draft} update={update}/>}
        </div>
      </div>

      {reajusteModal && (
        <ReajusteModal
          ipcaUltimo12={ipcaUltimo12}
          valorAtual={Number(draft.valorMensal) || 0}
          historico={draft.historicoReajustes || []}
          onClose={() => setReajusteModal(false)}
          onApply={aplicarReajuste}
        />
      )}
    </div>
  );
}

function TabDiagnostico({ draft, update }) {
  return (
    <>
      <div className="lp-card" style={{ padding: 24, marginBottom: 16 }}>

        <p style={{ fontSize: 13, color: 'var(--text-soft)', margin: '0 0 14px' }}>

const SUPABASE_URL = 'https://iuoqrkmlaknqgerorsdn.supabase.co';
const EDGE_URL = `${SUPABASE_URL}/functions/v1/enviar-cobranca`;
const EVOLUTION_URL = 'https://evolution-api-production-97e2.up.railway.app';
const EVOLUTION_KEY = '362c1e4117533525c670fbba77d6b87cdae3ad3505d5ad324a3b2628920155bd';
const EVOLUTION_INSTANCE = 'lp-finance';

function getAnonKey() {
  let key = localStorage.getItem('lp_anon_key');
  if (!key) {
    key = prompt('Cole sua Supabase Anon Key (Project Settings → API → anon public):');
    if (key) localStorage.setItem('lp_anon_key', key);
  }
  return key || '';
}

function getSB() {
  const key = getAnonKey();
  return supabase.createClient(SUPABASE_URL, key);
}

function Cobrancas({ showToast }) {
  const [clientes, setClientes] = useState([]);
  const [log, setLog] = useState([]);
  const [wppStatus, setWppStatus] = useState('checking');
  const [loading, setLoading] = useState(false);
  const [disparando, setDisparando] = useState(false);

  // Form state
  const [fNome, setFNome] = useState('');
  const [fTel, setFTel] = useState('');
  const [fDia, setFDia] = useState('');
  const [fValor, setFValor] = useState('');
  const [fAtivo, setFAtivo] = useState(true);

  // Templates
  const [msgVenc, setMsgVenc] = useState(
    localStorage.getItem('lp_msg_venc') ||
    'Olá, {nome}! 👋 Sua mensalidade da LP Finance vence *hoje* (dia {dia_venc}). Qualquer dúvida, estou à disposição. 🤝'
  );
  const [msgAtraso, setMsgAtraso] = useState(
    localStorage.getItem('lp_msg_atraso') ||
    'Olá, {nome}! 👋 Identificamos que sua mensalidade da LP Finance referente ao dia *{dia_venc}* ainda não foi paga. Por favor, regularize para manter seu plano ativo. Qualquer dúvida, estou à disposição. 🤝'
  );

  const [activeTab, setActiveTab] = useState('clientes');

  useEffect(() => {
    carregarClientes();
    carregarLog();
    verificarWpp();
  }, []);

  const verificarWpp = async () => {
    try {
      const r = await fetch(`${EVOLUTION_URL}/instance/connectionState/${EVOLUTION_INSTANCE}`, {
        headers: { apikey: EVOLUTION_KEY }
      });
      const d = await r.json();
      setWppStatus(d?.instance?.state === 'open' ? 'connected' : 'disconnected');
    } catch { setWppStatus('disconnected'); }
  };

  const carregarClientes = async () => {
    const sb = getSB();
    const { data, error } = await sb.from('billing_clients').select('*').order('nome');
    if (!error) setClientes(data || []);
  };

  const carregarLog = async () => {
    const sb = getSB();
    const { data } = await sb
      .from('cobranca_log')
      .select('*, billing_clients(nome)')
      .order('enviado_em', { ascending: false })
      .limit(30);
    setLog(data || []);
  };

  const salvarCliente = async () => {
    if (!fNome.trim() || !fTel.trim() || !fDia) { showToast('Preencha nome, telefone e dia'); return; }
    const dia = parseInt(fDia);
    if (dia < 1 || dia > 28) { showToast('Dia deve ser entre 1 e 28'); return; }
    setLoading(true);
    const sb = getSB();
    const { error } = await sb.from('billing_clients').insert({
      nome: fNome.trim(), telefone: fTel.trim(),
      dia_vencimento: dia, valor: parseFloat(fValor) || null, ativo: fAtivo
    });
    setLoading(false);
    if (error) { showToast('Erro: ' + error.message); return; }
    showToast('Cliente salvo ✓');
    setFNome(''); setFTel(''); setFDia(''); setFValor(''); setFAtivo(true);
    carregarClientes();
  };

  const toggleAtivo = async (id, atual) => {
    const sb = getSB();
    await sb.from('billing_clients').update({ ativo: !atual }).eq('id', id);
    carregarClientes();
    showToast(atual ? 'Cliente pausado' : 'Cliente ativado');
  };

  const excluirCliente = async (id, nome) => {
    if (!confirm(`Remover "${nome}"?`)) return;
    const sb = getSB();
    const { error } = await sb.from('billing_clients').delete().eq('id', id);
    if (error) { showToast('Erro ao excluir: ' + error.message); return; }
    carregarClientes();
    showToast('Cliente removido');
  };

  const salvarTemplates = () => {
    localStorage.setItem('lp_msg_venc', msgVenc);
    localStorage.setItem('lp_msg_atraso', msgAtraso);
    showToast('Mensagens salvas ✓');
  };

  const dispararAgora = async () => {
    setDisparando(true);
    const key = getAnonKey();
    try {
      const r = await fetch(EDGE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: '{}'
      });
      const d = await r.json();
      const total = d?.resultados?.length || 0;
      showToast(total > 0 ? `${total} mensagem(ns) disparada(s) ✓` : 'Nenhum cliente com vencimento hoje');
      carregarLog();
    } catch (e) { showToast('Erro: ' + e.message); }
    setDisparando(false);
  };

  const notificarAtraso = async (cliente) => {
    const template = msgAtraso
      .replace(/{nome}/g, cliente.nome)
      .replace(/{dia_venc}/g, cliente.dia_vencimento)
      .replace(/{valor}/g, cliente.valor ? `R$ ${Number(cliente.valor).toFixed(2).replace('.', ',')}` : '');

    if (!confirm(`Enviar cobrança de atraso para ${cliente.nome}?\n\n"${template}"`)) return;

    const key = getAnonKey();
    try {
      const r = await fetch(EDGE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({ tipo: 'atraso', client_id: cliente.id, mensagem: template })
      });
      const d = await r.json();
      showToast(d.ok ? `Atraso notificado para ${cliente.nome} ✓` : 'Erro ao enviar: ' + (d?.error || d?.message || 'tente novamente'));
      carregarLog();
    } catch (e) { showToast('Erro: ' + e.message); }
  };

  const statusColor = { connected: 'var(--green)', disconnected: 'var(--red)', checking: 'var(--text-muted)' };
  const statusLabel = { connected: 'WhatsApp conectado', disconnected: 'WhatsApp desconectado', checking: 'Verificando...' };

  return (
    <div>
      {/* Header */}
      <div className="row-between" style={{ marginBottom: 28 }}>
        <div>
          <h1 className="lp-display" style={{ margin: 0, fontSize: 32, fontWeight: 500, letterSpacing: '-0.02em' }}>Cobranças</h1>
          <p style={{ margin: '6px 0 0', color: 'var(--text-soft)', fontSize: 14 }}>Automação de mensalidades via WhatsApp</p>
        </div>
        <div className="row" style={{ gap: 16 }}>
          <div className="row" style={{ gap: 7 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: statusColor[wppStatus], boxShadow: wppStatus === 'connected' ? `0 0 8px ${statusColor[wppStatus]}` : 'none' }}/>
            <span style={{ fontSize: 13, color: 'var(--text-soft)' }}>{statusLabel[wppStatus]}</span>
          </div>
          <button className="lp-btn-cyan" onClick={dispararAgora} disabled={disparando}>
            {disparando
              ? <><span style={{ width: 14, height: 14, border: '2px solid rgba(11,30,63,0.2)', borderTopColor: 'var(--navy)', borderRadius: '50%', display: 'inline-block', animation: 'spin 0.7s linear infinite' }}/> Disparando...</>
              : <><Icon name="zap" size={15}/> Disparar hoje</>
            }
          </button>
        </div>
      </div>

      {/* Tabs */}
      <div className="lp-tabs">
        {[
          { id: 'clientes', label: 'Clientes' },
          { id: 'novo', label: '+ Novo cliente' },
          { id: 'mensagens', label: 'Mensagens' },
          { id: 'log', label: 'Log de envios' },
        ].map(t => (
          <button key={t.id} className={`lp-tab ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab: Clientes */}
      {activeTab === 'clientes' && (
        <div className="lp-card" style={{ overflow: 'hidden' }}>
          {clientes.length === 0 ? (
            <div className="lp-empty">
              <div className="lp-empty-icon"><Icon name="zap" size={28}/></div>
              <p>Nenhum cliente cadastrado ainda.</p>
              <button className="lp-btn-primary" onClick={() => setActiveTab('novo')} style={{ marginTop: 12 }}>
                <Icon name="plus" size={14}/> Cadastrar primeiro cliente
              </button>
            </div>
          ) : (
            <table className="lp-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Telefone</th>
                  <th>Vencimento</th>
                  <th>Valor</th>
                  <th>Status</th>
                  <th style={{ textAlign: 'right' }}>Ações</th>
                </tr>
              </thead>
              <tbody>
                {clientes.map(c => (
                  <tr key={c.id} style={{ cursor: 'default' }}>
                    <td style={{ fontWeight: 600 }}>{c.nome}</td>
                    <td style={{ color: 'var(--text-soft)', fontFamily: 'monospace', fontSize: 13 }}>{c.telefone}</td>
                    <td>Dia {c.dia_vencimento}</td>
                    <td>{c.valor ? fmtBRL(Number(c.valor)) : '—'}</td>
                    <td>
                      <span className={`lp-badge ${c.ativo ? 'lp-badge-green' : 'lp-badge-red'}`}>
                        {c.ativo ? 'Ativo' : 'Inativo'}
                      </span>
                    </td>
                    <td>
                      <div className="row" style={{ gap: 6, justifyContent: 'flex-end' }}>
                        <button
                          className="lp-btn-ghost"
                          style={{ padding: '6px 10px', fontSize: 12, color: 'var(--amber)', borderColor: 'rgba(180,83,9,0.25)' }}
                          onClick={() => notificarAtraso(c)}
                          title="Notificar atraso"
                        >
                          ⚠ Atraso
                        </button>
                        <button
                          className="lp-btn-ghost"
                          style={{ padding: '6px 10px', fontSize: 12 }}
                          onClick={() => toggleAtivo(c.id, c.ativo)}
                        >
                          {c.ativo ? 'Pausar' : 'Ativar'}
                        </button>
                        <button
                          className="lp-btn-danger"
                          style={{ padding: '6px 10px', fontSize: 12 }}
                          onClick={() => excluirCliente(c.id, c.nome)}
                        >
                          ✕
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* Tab: Novo Cliente */}
      {activeTab === 'novo' && (
        <div className="lp-card" style={{ padding: 28, maxWidth: 600 }}>
          <h2 className="lp-section-title">Novo cliente de cobrança</h2>
          <div className="grid-2" style={{ marginBottom: 14 }}>
            <div>
              <label className="lp-label">Nome</label>
              <input className="lp-input" value={fNome} onChange={e => setFNome(e.target.value)} placeholder="João Silva"/>
            </div>
            <div>
              <label className="lp-label">Telefone (com DDI)</label>
              <input className="lp-input" value={fTel} onChange={e => setFTel(e.target.value)} placeholder="5521999999999"/>
            </div>
          </div>
          <div className="grid-2" style={{ marginBottom: 14 }}>
            <div>
              <label className="lp-label">Dia de vencimento</label>
              <input className="lp-input" type="number" min="1" max="28" value={fDia} onChange={e => setFDia(e.target.value)} placeholder="10"/>
            </div>
            <div>
              <label className="lp-label">Valor mensal (R$)</label>
              <input className="lp-input" type="number" step="0.01" value={fValor} onChange={e => setFValor(e.target.value)} placeholder="297,00"/>
            </div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
            <input type="checkbox" id="fAtivo" checked={fAtivo} onChange={e => setFAtivo(e.target.checked)} style={{ width: 16, height: 16, accentColor: 'var(--cyan)' }}/>
            <label htmlFor="fAtivo" style={{ fontSize: 14, color: 'var(--text-soft)', cursor: 'pointer' }}>Cliente ativo (receberá cobranças automáticas)</label>
          </div>
          <button className="lp-btn-primary" onClick={salvarCliente} disabled={loading}>
            {loading ? 'Salvando...' : <><Icon name="plus" size={14}/> Salvar cliente</>}
          </button>
        </div>
      )}

      {/* Tab: Mensagens */}
      {activeTab === 'mensagens' && (
        <div className="lp-card" style={{ padding: 28, maxWidth: 640 }}>
          <h2 className="lp-section-title">Templates de mensagem</h2>
          <div style={{ marginBottom: 20 }}>
            <label className="lp-label">Cobrança no dia do vencimento</label>
            <textarea
              className="lp-textarea"
              rows={3}
              value={msgVenc}
              onChange={e => setMsgVenc(e.target.value)}
            />
            <p className="lp-hint">Disparada automaticamente todo dia às 9h para clientes com vencimento naquele dia.</p>
          </div>
          <div style={{ marginBottom: 20 }}>
            <label className="lp-label">Cobrança de atraso</label>
            <textarea
              className="lp-textarea"
              rows={3}
              value={msgAtraso}
              onChange={e => setMsgAtraso(e.target.value)}
            />
            <p className="lp-hint">Disparada manualmente clicando em "⚠ Atraso" na tabela de clientes.</p>
          </div>
          <div style={{ padding: '12px 16px', background: 'var(--cyan-light)', borderRadius: 8, marginBottom: 20 }}>
            <p style={{ margin: 0, fontSize: 13, color: '#0E7490' }}>
              <strong>Variáveis disponíveis:</strong>{' '}
              {['{nome}', '{dia_venc}', '{valor}'].map(v => (
                <code key={v} style={{ background: 'rgba(14,116,144,0.12)', padding: '1px 6px', borderRadius: 4, margin: '0 3px', fontSize: 12 }}>{v}</code>
              ))}
            </p>
          </div>
          <button className="lp-btn-primary" onClick={salvarTemplates}>
            <Icon name="check" size={14}/> Salvar mensagens
          </button>
        </div>
      )}

      {/* Tab: Log */}
      {activeTab === 'log' && (
        <div className="lp-card" style={{ overflow: 'hidden' }}>
          <div className="row-between" style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)' }}>
            <h2 className="lp-section-title" style={{ margin: 0 }}>Histórico de envios</h2>
            <button className="lp-btn-ghost" style={{ padding: '7px 12px', fontSize: 12 }} onClick={carregarLog}>
              <Icon name="refresh" size={13}/> Atualizar
            </button>
          </div>
          {log.length === 0 ? (
            <div className="lp-empty"><p>Nenhum envio registrado ainda.</p></div>
          ) : (
            <table className="lp-table">
              <thead>
                <tr>
                  <th>Cliente</th>
                  <th>Data/hora</th>
                  <th>Tipo</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {log.map(l => (
                  <tr key={l.id} style={{ cursor: 'default' }}>
                    <td style={{ fontWeight: 600 }}>{l.billing_clients?.nome || '—'}</td>
                    <td style={{ color: 'var(--text-soft)', fontSize: 13 }}>
                      {new Date(l.enviado_em).toLocaleString('pt-BR')}
                    </td>
                    <td>
                      <span className={`lp-badge ${l.status === 'atraso_enviado' ? 'lp-badge-amber' : 'lp-badge-cyan'}`}>
                        {l.status === 'atraso_enviado' ? 'Atraso' : 'Vencimento'}
                      </span>
                    </td>
                    <td>
                      <span className={`lp-badge ${l.status?.includes('enviado') ? 'lp-badge-green' : 'lp-badge-red'}`}>
                        {l.status?.includes('enviado') ? 'Enviado' : 'Erro'}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

/* =========================================================================
   MOUNT
   ========================================================================= */

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
